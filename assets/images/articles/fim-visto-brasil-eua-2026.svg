  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 140 L1600 0 L1600 250 L0 390 Z" fill="#ffffff" opacity=".10"/>
  <path d="M0 690 L1600 500 L1600 900 L0 900 Z" fill="#16a34a" opacity=".20"/>

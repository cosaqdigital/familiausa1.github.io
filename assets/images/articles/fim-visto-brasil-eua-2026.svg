  <text x="136" y="582" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="900" fill="#fff">Brasileiros ainda precisam conferir</text>
  <text x="136" y="630" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#facc15">DS-160 • ESTA • Visa Waiver Program</text>

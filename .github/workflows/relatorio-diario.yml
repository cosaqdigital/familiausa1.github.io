name: Relatorio diario de tendencias

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: write

jobs:
  gerar-relatorio:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerar relatorio diario
        run: python scripts/gerar_relatorio_diario.py

      - name: Salvar relatorio no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add relatorios-diarios/
          git commit -m "Adiciona relatorio diario automatico" || echo "Nenhuma alteracao para salvar"
          git push
